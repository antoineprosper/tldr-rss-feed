name: Update RSS Feed

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:        # lets you trigger it manually to test
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes the Node.js 20 warning

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit back to the repo
      actions: write        # needed to disable/enable workflows via API

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run feed updater
        run: python update_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --cached --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Daily RSS update $(date -u +%Y-%m-%d)"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Disable this workflow until tomorrow
        if: steps.commit.outputs.committed == 'true'
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-rss.yml/disable
