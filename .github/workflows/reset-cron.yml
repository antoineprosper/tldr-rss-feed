name: Reset RSS Cron

on:
  schedule:
    - cron: '0 6 * * *'    # 6:00 UTC daily — before the article is usually up
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Re-enable the RSS update workflow
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update-rss.yml/enable
